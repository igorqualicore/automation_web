name: Cypress E2E

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 11 * * *'

jobs:
  e2e:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        node-version:
          - 22

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Run Cypress tests
        uses: cypress-io/github-action@v7
        env:
          REPORT_OS: ${{ matrix.os }}
        with:
          install-command: npm ci
          command: npm run test:ci

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cypress-artifacts-${{ matrix.os }}
          path: |
            cypress/reports/
            cypress/screenshots/

  report:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Download all execution artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts
          pattern: cypress-artifacts-*

      - name: Build consolidated HTML dashboard
        run: node scripts/generate-ci-dashboard.js artifacts consolidated-report

      - name: Upload consolidated dashboard
        uses: actions/upload-artifact@v7
        with:
          name: cypress-dashboard-report
          path: consolidated-report/